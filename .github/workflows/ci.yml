name: Python Data Science CI

# Trigger the workflow on push or pull request to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out your repository code so the workflow can access it
    - name: Checkout repository code
      uses: actions/checkout@v4

    # Step 2: Set up the Python environment
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-with-version: '3.10'

    # Step 3: Cache dependencies to speed up future workflow runs
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # Step 4: Install your project requirements
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Step 5: Run your Python script/pipeline
    - name: Run model pipeline script
      run: |
        python tests/test_data_check.py